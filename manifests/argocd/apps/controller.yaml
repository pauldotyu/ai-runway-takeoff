apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airunway-controller
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/pauldotyu/ai-runway-takeoff.git
    targetRevision: HEAD
    path: manifests/apps/controller
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true